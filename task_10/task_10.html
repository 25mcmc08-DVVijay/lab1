<!DOCTYPE html>
<html>
<head>
    <title>Tab Plugin</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script src="task_10.js"></script>

</head>
<body>

<div class="tabs">
    <ul class="tab-links" role="tablist">
        <li data-tab="home" role="tab">Home</li>
        <li data-tab="about" role="tab">About</li>
        <li data-tab="contact" role="tab">Contact</li>
    </ul>

    <div class="tab-content">
        <div id="home" class="tab-panel" role="tabpanel">
            <h3>Home Section</h3>
            <p>Welcome to the Home page.</p>
        </div>

        <div id="about" class="tab-panel" role="tabpanel">
            <h3>About Section</h3>
            <p>This is the About page.</p>
        </div>

        <div id="contact" class="tab-panel" role="tabpanel">
            <h3>Contact Section</h3>
            <p>Contact us at example@email.com</p>
        </div>
    </div>
</div>

</body>
</html>
